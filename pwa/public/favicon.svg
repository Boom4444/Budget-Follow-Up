<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="bar_a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Soft glow top-right -->
  <circle cx="400" cy="112" r="140" fill="#818cf8" opacity="0.18"/>

  <!-- Subtle euro watermark -->
  <text x="52" y="148" font-size="130" font-family="Georgia,serif" font-weight="700"
        fill="white" opacity="0.07">€</text>

  <!-- Baseline -->
  <rect x="72" y="410" width="368" height="10" rx="5" fill="white" opacity="0.25"/>

  <!-- Bar 1 (short) -->
  <rect x="82"  y="300" width="90" height="110" rx="14" fill="url(#bar_a)" opacity="0.70"/>
  <!-- Bar 2 (medium) -->
  <rect x="211" y="210" width="90" height="200" rx="14" fill="url(#bar_a)" opacity="0.85"/>
  <!-- Bar 3 (tall) -->
  <rect x="340" y="120" width="90" height="290" rx="14" fill="url(#bar_a)" opacity="1.00"/>

  <!-- Amber trend line -->
  <polyline points="127,300 256,210 385,120"
            fill="none" stroke="#fbbf24" stroke-width="11"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Trend dots -->
  <circle cx="127" cy="300" r="11" fill="#fbbf24"/>
  <circle cx="256" cy="210" r="11" fill="#fbbf24"/>
  <circle cx="385" cy="120" r="11" fill="#fbbf24"/>

  <!-- Up arrow top-right of last dot -->
  <polygon points="385,75  403,105  367,105" fill="#fbbf24" opacity="0.90"/>
</svg>